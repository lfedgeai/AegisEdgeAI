name: Unified Identity CI

on:
    push:
        branches:
            [
                "main",
                "develop",
                "hybrid-cloud-poc",
                "feat/**",
                "ci-cd-clean-slate",
            ]
    pull_request:
        branches: ["main", "develop", "hybrid-cloud-poc"]
    workflow_dispatch:

jobs:
    license-headers:
        name: Check Apache 2.0 License Headers
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Check License Headers
              run: |
                  cd hybrid-cloud-poc
                  python3 scripts/add_license_headers.py --check --root .
              continue-on-error: false

    integration-test:
        name: Hybrid Cloud PoC Integration Test
        runs-on: self-hosted
        timeout-minutes: 30

        steps:
            - name: Pre-Run Environment Cleanup
              run: |
                  echo "🧹 Cleaning orphan processes and stale workspaces..."
                  # Ensure working directory exists (previous run may have deleted it)
                  mkdir -p /home/mw/actions-runner/_work/AegisSovereignAI/AegisSovereignAI
                  pkill -9 -f "envoy" || true
                  pkill -9 -f "spire-server" || true
                  pkill -9 -f "spire-agent" || true
                  pkill -9 -f "tpm_plugin" || true
                  pkill -9 -f "ci_test_runner" || true
                  pkill -9 -f "test_integration" || true
                  # Clean up temp files from previous runs
                  rm -rf /tmp/unified_identity_test_* || true
                  rm -rf /tmp/spire-* || true
                  echo "✅ Pre-cleanup complete"

            - name: Checkout Code (Fresh Clone)
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  clean: true

            - name: Debug - Inspect File System
              run: |
                  echo "Current directory: $(pwd)"
                  echo "Workspace: ${{ github.workspace }}"
                  echo "Runner _work directory contents:"
                  ls -la /home/mw/actions-runner/_work/ || true

            - name: Install Python Dependencies
              timeout-minutes: 5
              run: |
                  cd hybrid-cloud-poc
                  python3 -m pip install --upgrade pip
                  python3 -m pip install -r keylime/requirements.txt

            - name: Run Integration Tests
              timeout-minutes: 5
              shell: bash
              env:
                  TMPDIR: /tmp
              run: |
                  cd hybrid-cloud-poc
                  chmod +x ci_test_runner.py test_integration.sh
                  echo "🧪 Running integration tests with ci_test_runner.py..."
                  python3 ./ci_test_runner.py --no-color -- --control-plane-host 10.1.0.10 --agents-host 10.1.0.10 --onprem-host 10.1.0.10
                  echo "✅ Integration tests completed"

            - name: Post-Run Cleanup (Mandatory Purge)
              if: always()
              run: |
                  echo "🗑️ Purging all workspaces to prevent state poisoning..."
                  # Kill any spawned processes
                  pkill -9 -f "spire-server" || true
                  pkill -9 -f "spire-agent" || true
                  pkill -9 -f "tpm_plugin" || true
                  pkill -9 -f "envoy" || true
                  pkill -9 -f "ci_test_runner" || true
                  pkill -9 -f "test_integration" || true
                  # Remove temp files
                  rm -rf /tmp/unified_identity_test_* || true
                  rm -rf /tmp/spire-* || true
                  # CRITICAL: Delete the ENTIRE AegisSovereignAI folder from _work directory
                  echo "Deleting entire AegisSovereignAI folder from _work directory..."
                  rm -rf /home/mw/actions-runner/_work/AegisSovereignAI || true
                  echo "Verifying cleanup:"
                  ls -la /home/mw/actions-runner/_work/ || echo "_work directory listing"
                  echo "✅ Post-cleanup complete - AegisSovereignAI folder deleted from machine"
