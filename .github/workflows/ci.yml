name: Unified Identity CI

on:
    push:
        branches: ["main", "develop", "hybrid-cloud-poc", "feat/**", "ci-cd-clean-slate"]
    pull_request:
        branches: ["main", "develop", "hybrid-cloud-poc"]
    workflow_dispatch:

jobs:
    license-headers:
        name: Check Apache 2.0 License Headers
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Check License Headers
              run: |
                  cd hybrid-cloud-poc
                  python3 scripts/add_license_headers.py --check --root .
              continue-on-error: false

    integration-test:
        name: Hybrid Cloud PoC Integration Test
        runs-on: self-hosted

        steps:
            - name: Pre-Run Environment Cleanup
              run: |
                  echo "🧹 Cleaning orphan processes to prevent state poisoning..."
                  pkill -9 -f "envoy" || true
                  pkill -9 -f "Runner.Listener" || true
                  pkill -9 -f "spire-server" || true
                  pkill -9 -f "spire-agent" || true
                  pkill -9 -f "tpm_plugin" || true
                  rm -rf /tmp/unified_identity_test_* || true
                  rm -rf /tmp/spire-* || true
                  echo "✅ Pre-cleanup complete"

            - name: Checkout Code (Fresh Clone)
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  clean: true

            - name: Debug - Inspect File System
              run: |
                  echo "Current directory: $(pwd)"
                  echo "Workspace: ${{ github.workspace }}"
                  ls -la hybrid-cloud-poc/ | head -20

            - name: Install Python Dependencies
              run: |
                  cd hybrid-cloud-poc
                  python3 -m pip install --upgrade pip
                  python3 -m pip install -r keylime/requirements.txt

            - name: Run Integration Tests
              shell: bash
              env:
                  TMPDIR: /tmp
              run: |
                  cd hybrid-cloud-poc
                  chmod +x ci_test_runner.py test_integration.sh
                  python3 ./ci_test_runner.py --no-color

            - name: Post-Run Cleanup (Mandatory Purge)
              if: always()
              run: |
                  echo "🗑️ Purging workspace to prevent state poisoning..."
                  pkill -9 -f "spire-server" || true
                  pkill -9 -f "spire-agent" || true
                  pkill -9 -f "tpm_plugin" || true
                  pkill -9 -f "envoy" || true
                  rm -rf /tmp/unified_identity_test_* || true
                  rm -rf /tmp/spire-* || true
                  rm -rf ${{ github.workspace }}/* || true
                  echo "✅ Post-cleanup complete - workspace purged"
